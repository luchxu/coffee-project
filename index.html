<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Selection</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Coffee!</h1>

    <!-- 搜索/筛选表单 -->
    <form>
        <label for="roast-selection">Search by name:</label>
        <input type="text" id="name-search" placeholder="e.g.Espresso" />

        <label for="roase-selection">Select roast type:</label>
        <select id="roast-selection">
            <option>light</option>
            <option>medium</option>
            <option>dark</option>
        </select>
        <input id="submit" type="submit" value=""Filter />
    </form>

    <!-- 咖啡列表容器 -->
    <div id="coffees"></div>
    
    <!-- 添加新咖啡表单 -->
    <h2>Add a New Coffee</h2>
    <form id="add-coffee-form">
        <label for="new-name">Coffee Name:</label>
        <input type="text" id="new-name" placeholder="Enter coffee name" required />

        <label for="new-roast">Roast Level:</label>
        <select id="new-roast">
            <option value="light">light</option>
            <option value="medium">medium</option>
            <option value="dark">dark</option>
        </select>

        <input type="sumbit" value="Add Coffee" />
    </form>

    <script src="main.js"></script>
</body>
</html>
